# Production compose for deploying pre-built images from ghcr.io
# Usage: sudo nerdctl compose -f docker-compose.deploy.yml --env-file .env.production up -d
#
# Uses host networking for IPv6 support and simplicity on a single VPS.
#
# Prerequisites:
#   1. Create .env.production with your secrets (see .env.production.example)
#   2. Domain pointing to your VPS IP
#   3. Log in to ghcr.io: sudo nerdctl login ghcr.io
#   4. VPC IPv6 configured (Supabase requires IPv6 connectivity)

services:
  backend:
    image: ghcr.io/estk/track-leader/backend:latest
    container_name: tracks_backend
    network_mode: host
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      OBJECT_STORE_PATH: /app/uploads
      PORT: 3001
      RUST_LOG: ${RUST_LOG:-info}
      PASETO_KEY: ${PASETO_KEY:?PASETO_KEY is required}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS:-2}
    volumes:
      - uploads_data:/app/uploads
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/estk/track-leader/frontend:latest
    container_name: tracks_frontend
    network_mode: host
    environment:
      NODE_ENV: production
      BACKEND_URL: http://localhost:3001
    command: ["sh", "-c", "HOSTNAME=0.0.0.0 node server.js"]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: tracks_caddy
    network_mode: host
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: always

volumes:
  uploads_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

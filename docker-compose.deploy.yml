# Production compose for deploying pre-built images from ghcr.io
# Usage: sudo nerdctl compose -f docker-compose.deploy.yml --env-file .env.production up -d
#
# Prerequisites:
#   1. Run scripts/supabase-setup.sql in Supabase SQL Editor
#   2. Create .env.production with your secrets
#   3. Domain pointing to your VPS IP
#   4. Log in to ghcr.io: sudo nerdctl login ghcr.io

services:
  backend:
    image: ghcr.io/estk/track-leader/backend:latest
    container_name: tracks_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      OBJECT_STORE_PATH: /app/uploads
      PORT: 3001
      RUST_LOG: ${RUST_LOG:-info}
      PASETO_KEY: ${PASETO_KEY:?PASETO_KEY is required}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS:-2}
    volumes:
      - uploads_data:/app/uploads
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal

  frontend:
    image: ghcr.io/estk/track-leader/frontend:latest
    container_name: tracks_frontend
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: tracks_caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - internal

volumes:
  uploads_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  internal:
    name: tracks_network
